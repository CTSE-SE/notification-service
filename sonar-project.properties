# SonarCloud project configuration
# https://sonarcloud.io

sonar.projectKey=your-github-org_notification-service
sonar.organization=your-sonarcloud-org

# Project metadata
sonar.projectName=Notification Service
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js

# Test coverage report (generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-reporter.xml

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate – fail the pipeline if any of these are breached
# (Configured in SonarCloud dashboard UI, not here)
